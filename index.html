<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Team Cards - Algoritmos</title>
    <!-- importacion de estilos-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Colección de Cartas</h1>
        <p>Avance Fase 1: Estructura Visual y Lógica de Datos</p>
    </header>

    <main>
        <div id="contenedor-cartas">

            <!-- CARTA 1: MESSI -->
            <div class="carta">
                <div class="carta-top">
                    <div class="carta-rating">90</div>
                    <div class="carta-posicion">EI</div>
                </div>
                <div class="carta-imagen">
                    <img src="./img/messi.jpg" alt="Foto de Lionel Messi">
                </div>
                <h3 class="carta-nombre">Lionel Messi</h3>
                <div class="carta-stats">
                    <div class="stat"><span class="val">80</span><span class="lbl">RIT</span></div>
                    <div class="stat"><span class="val">87</span><span class="lbl">TIR</span></div>
                    <div class="stat"><span class="val">90</span><span class="lbl">PAS</span></div>
                    <div class="stat"><span class="val">94</span><span class="lbl">REG</span></div>
                    <div class="stat"><span class="val">33</span><span class="lbl">DEF</span></div>
                    <div class="stat"><span class="val">64</span><span class="lbl">FIS</span></div>
                </div>
            </div>

            <!-- CARTA 2: MBAPPÉ -->
            <div class="carta">
                <div class="carta-top">
                    <div class="carta-rating">91</div>
                    <div class="carta-posicion">DC</div>
                </div>
                <div class="carta-imagen">
                    <img src="./img/Mbappe.jpg" alt="Foto de Kilian Mbappé">
                </div>
                <h3 class="carta-nombre">Kilian Mbappé</h3>
                <div class="carta-stats">
                    <div class="stat"><span class="val">97</span><span class="lbl">RIT</span></div>
                    <div class="stat"><span class="val">90</span><span class="lbl">TIR</span></div>
                    <div class="stat"><span class="val">80</span><span class="lbl">PAS</span></div>
                    <div class="stat"><span class="val">92</span><span class="lbl">REG</span></div>
                    <div class="stat"><span class="val">36</span><span class="lbl">DEF</span></div>
                    <div class="stat"><span class="val">78</span><span class="lbl">FIS</span></div>
                </div>
            </div>

            <!-- CARTA 3: VINI JR -->
            <div class="carta">
                <div class="carta-top">
                    <div class="carta-rating">89</div>
                    <div class="carta-posicion">EI</div>
                </div>
                <div class="carta-imagen">
                    <img src="./img/Vini.jpg" alt="Foto de Vini Jr.">
                </div>
                <h3 class="carta-nombre">Vini Jr.</h3>
                <div class="carta-stats">
                    <div class="stat"><span class="val">95</span><span class="lbl">RIT</span></div>
                    <div class="stat"><span class="val">82</span><span class="lbl">TIR</span></div>
                    <div class="stat"><span class="val">81</span><span class="lbl">PAS</span></div>
                    <div class="stat"><span class="val">90</span><span class="lbl">REG</span></div>
                    <div class="stat"><span class="val">29</span><span class="lbl">DEF</span></div>
                    <div class="stat"><span class="val">68</span><span class="lbl">FIS</span></div>
                </div>
            </div>

            <!-- CARTA 4: BELLINGHAM -->
            <div class="carta">
                <div class="carta-top">
                    <div class="carta-rating">86</div>
                    <div class="carta-posicion">MC</div>
                </div>
                <div class="carta-imagen">
                    <img src="./img/Bellingham.jpg" alt="Foto de J. Bellingham">
                </div>
                <h3 class="carta-nombre">J. Bellingham</h3>
                <div class="carta-stats">
                    <div class="stat"><span class="val">82</span><span class="lbl">RIT</span></div>
                    <div class="stat"><span class="val">84</span><span class="lbl">TIR</span></div>
                    <div class="stat"><span class="val">85</span><span class="lbl">PAS</span></div>
                    <div class="stat"><span class="val">88</span><span class="lbl">REG</span></div>
                    <div class="stat"><span class="val">78</span><span class="lbl">DEF</span></div>
                    <div class="stat"><span class="val">82</span><span class="lbl">FIS</span></div>
                </div>
            </div>

        </div>
    </main>

    <!-- impocion de script -->
    <script src="app.js"></script>
</body>

</html>
